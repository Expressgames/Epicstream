<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pollinations Studio iOS</title>
  <style>
    :root {
      --bg: #090a0f;
      --card: #131722;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #1f293d;
      --danger: #ef4444;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 40px;
    }

    .header-bar {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: var(--radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .pollen-stats {
      display: flex;
      gap: 14px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-item .label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .stat-item .value {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      font-family: ui-monospace, monospace;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* 16px min font size prevents iOS auto-zoom on focus */
    textarea, select, input {
      background: #06080d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 10px;
      font-size: 16px; 
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    textarea:focus, select:focus, input:focus {
      border-color: var(--accent);
    }

    textarea {
      resize: none;
      height: 90px;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }

    .output-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      position: relative;
      overflow: hidden;
    }

    .output-card img {
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
    }

    .placeholder-text {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    .loader {
      display: none;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      display: none;
      text-align: center;
      padding: 10px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-top: 8px;
    }

    .secondary-btn {
      background: #1e2538;
      color: var(--text);
      box-shadow: none;
      font-size: 0.9rem;
      padding: 10px;
    }
    
    .secondary-btn:hover {
      background: #28314a;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-bar">
      <span class="header-title">Sana Studio</span>
      <div class="pollen-stats">
        <div class="stat-item">
          <span class="label">Spent</span>
          <span class="value" id="pollenUsed">0.0000000</span>
        </div>
        <div class="stat-item">
          <span class="label">Balance</span>
          <span class="value" id="balanceLeft">Sync...</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="Describe your image...">A futuristic Tokyo cyber street in rain, highly detailed</textarea>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="aspectRatio">Aspect Ratio</label>
          <select id="aspectRatio">
            <option value="1:1" selected>1:1 Square</option>
            <option value="16:9">16:9 Landscape</option>
            <option value="9:16">9:16 Story (Vertical)</option>
            <option value="4:3">4:3 Standard</option>
            <option value="3:4">3:4 Portrait</option>
          </select>
        </div>
        <div class="form-group">
          <label for="qualityTier">Resolution Tier</label>
          <select id="qualityTier">
            <option value="1024" selected>1K (Fast)</option>
            <option value="1536">2K (High)</option>
            <option value="2048">3K (Ultra)</option>
            <option value="2560">4K (Max)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="seed">Seed (Optional)</label>
        <input type="number" id="seed" placeholder="Random">
      </div>

      <button id="genBtn" onclick="generateImage()">Generate Image</button>
    </div>

    <div class="output-card">
      <div id="loader" class="loader"></div>
      <div id="placeholder" class="placeholder-text">Generated image will appear here</div>
      <div id="errorMsg" class="error-msg"></div>
      <img id="resultImg" alt="Generated result" />
      
      <div id="actionsContainer" style="display: none; width: 100%; flex-direction: column;">
        <div class="action-row">
          <button class="secondary-btn" onclick="downloadImage()">Save to Photos</button>
          <button class="secondary-btn" onclick="copyImageUrl()">Copy Link</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "sk_6AwApP2XGqJcD2mH5XY2nyOCCUdNPXx9";
    let cachedBalance = null;
    let totalSpent = 0;

    async function updateBalance() {
      try {
        const res = await fetch('https://gen.pollinations.ai/account/balance', {
          headers: { 'Authorization': `Bearer ${API_KEY}` }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const bal = parseFloat(data.balance ?? data);
        
        if (!isNaN(bal)) {
          if (cachedBalance === null) cachedBalance = bal;
          document.getElementById('balanceLeft').innerText = bal.toFixed(2);
        } else {
          document.getElementById('balanceLeft').innerText = "Active";
        }
      } catch {
        document.getElementById('balanceLeft').innerText = "Active";
      }
    }

    function calculateDimensions() {
      const ratio = document.getElementById('aspectRatio').value;
      const baseSize = parseInt(document.getElementById('qualityTier').value);
      
      let w = baseSize, h = baseSize;
      if (ratio === '16:9') {
        w = baseSize;
        h = Math.round(baseSize * (9/16));
      } else if (ratio === '9:16') {
        w = Math.round(baseSize * (9/16));
        h = baseSize;
      } else if (ratio === '4:3') {
        w = baseSize;
        h = Math.round(baseSize * (3/4));
      } else if (ratio === '3:4') {
        w = Math.round(baseSize * (3/4));
        h = baseSize;
      }
      return { width: w, height: h };
    }

    async function generateImage() {
      const prompt = document.getElementById('prompt').value.trim();
      const seed = document.getElementById('seed').value;
      const { width, height } = calculateDimensions();

      const genBtn = document.getElementById('genBtn');
      const loader = document.getElementById('loader');
      const placeholder = document.getElementById('placeholder');
      const errorMsg = document.getElementById('errorMsg');
      const resultImg = document.getElementById('resultImg');
      const actionsContainer = document.getElementById('actionsContainer');

      if (!prompt) return;

      errorMsg.style.display = 'none';
      placeholder.style.display = 'none';
      resultImg.style.display = 'none';
      actionsContainer.style.display = 'none';
      loader.style.display = 'block';
      genBtn.disabled = true;

      try {
        let url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?model=sana&width=${width}&height=${height}&nologo=true&key=${API_KEY}`;
        if (seed) url += `&seed=${seed}`;

        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${API_KEY}` }
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => null);
          throw new Error(errData?.error?.message || `Generation failed (${response.status})`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        
        resultImg.src = objectUrl;
        resultImg.dataset.rawUrl = url;
        resultImg.style.display = 'block';
        actionsContainer.style.display = 'flex';

        // Simulate fine-grained spend tracking per high-res render tier
        let estimatedCost = 0.0000150;
        if (width >= 2048) estimatedCost = 0.0000450;
        else if (width >= 1536) estimatedCost = 0.0000300;
        
        totalSpent += estimatedCost;
        document.getElementById('pollenUsed').innerText = totalSpent.toFixed(7);

        // Try checking fresh balance
        await updateBalance();
      } catch (err) {
        errorMsg.innerText = err.message || "Something went wrong";
        errorMsg.style.display = 'block';
        placeholder.style.display = 'block';
      } finally {
        loader.style.display = 'none';
        genBtn.disabled = false;
      }
    }

    function downloadImage() {
      const img = document.getElementById('resultImg');
      const a = document.createElement('a');
      a.href = img.src;
      a.download = `sana-image-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function copyImageUrl() {
      const url = document.getElementById('resultImg').dataset.rawUrl;
      navigator.clipboard.writeText(url);
      alert("Image URL copied to clipboard!");
    }

    window.addEventListener('DOMContentLoaded', updateBalance);
  </script>
